name: liquid_glass_bottom_nav
description: "A beautiful, liquid frosted-glass floating bottom navigation bar for Flutter."
version: 0.0.6
homepage: https://github.com/akbardzulfikar/liquid_glass_bottom_nav
repository: https://github.com/akbardzulfikar/liquid_glass_bottom_nav

environment:
  sdk: ^3.10.3
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  flutter_shaders: ^0.1.3
  logging: ^1.3.0
  motor: ^1.0.1
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter:
  shaders:
    - lib/src/liquid_glass_renderer/assets/shaders/liquid_glass_geometry_blended.frag
    - lib/src/liquid_glass_renderer/assets/shaders/liquid_glass_filter.frag
    - lib/src/liquid_glass_renderer/assets/shaders/liquid_glass_arbitrary.frag
    - lib/src/liquid_glass_renderer/assets/shaders/liquid_glass_final_render.frag

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
